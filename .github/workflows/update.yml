name: Auto-update packages

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  pijul:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Check for new version
        id: check
        run: |
          CURRENT=$(brew info --json=v1 ataias/formulae/pijul | jq -r '.[0].versions.stable')
          LATEST=$(curl -sf https://crates.io/api/v1/crates/pijul | jq -r '.crate.newest_version')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Failed to fetch latest pijul version from crates.io"
            exit 1
          fi
          if [ "$CURRENT" != "$LATEST" ]; then
            {
              echo "current=$CURRENT"
              echo "latest=$LATEST"
              echo "needs_update=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Bump formula PR
        if: steps.check.outputs.needs_update == 'true'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          brew bump-formula-pr \
            --no-browse \
            --no-fork \
            --version="$LATEST" \
            --url="https://static.crates.io/crates/pijul/pijul-${LATEST}.crate" \
            ataias/formulae/pijul

  zig-master-check:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      version: ${{ steps.zig-info.outputs.version }}
      date: ${{ steps.zig-info.outputs.date }}
      aarch64_macos_sha: ${{ steps.zig-info.outputs.aarch64_macos_sha }}
      x86_64_macos_sha: ${{ steps.zig-info.outputs.x86_64_macos_sha }}
      aarch64_linux_sha: ${{ steps.zig-info.outputs.aarch64_linux_sha }}
      x86_64_linux_sha: ${{ steps.zig-info.outputs.x86_64_linux_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch Zig master info
        id: zig-info
        run: |
          curl -sL https://ziglang.org/download/index.json | jq -r '.master' > /tmp/zig-master.json
          {
            echo "version=$(jq -r '.version' /tmp/zig-master.json)"
            echo "date=$(jq -r '.date' /tmp/zig-master.json)"
            echo "aarch64_macos_sha=$(jq -r '."aarch64-macos".shasum' /tmp/zig-master.json)"
            echo "x86_64_macos_sha=$(jq -r '."x86_64-macos".shasum' /tmp/zig-master.json)"
            echo "aarch64_linux_sha=$(jq -r '."aarch64-linux".shasum' /tmp/zig-master.json)"
            echo "x86_64_linux_sha=$(jq -r '."x86_64-linux".shasum' /tmp/zig-master.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_VERSION="${{ steps.zig-info.outputs.version }}"
          CURRENT_VERSION=$(grep 'version "' Formula/zig-master.rb | head -1 | sed 's/.*version "//;s/".*//')
          RELEASE_EXISTS=$(gh release view zig-master-latest --json tagName 2>/dev/null && echo true || echo false)
          if [ "$CURRENT_VERSION" != "$NEW_VERSION" ] || [ "$RELEASE_EXISTS" = "false" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

  zig-master-test:
    needs: zig-master-check
    if: needs.zig-master-check.outputs.needs_update == 'true'
    strategy:
      matrix:
        include:
          - os: macos-26
            arch: aarch64
            platform: macos
          - os: ubuntu-latest
            arch: x86_64
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download and extract Zig
        run: |
          VERSION="${{ needs.zig-master-check.outputs.version }}"
          curl -L -o zig.tar.xz "https://ziglang.org/builds/zig-${{ matrix.arch }}-${{ matrix.platform }}-${VERSION}.tar.xz"
          EXPECTED="${{ needs.zig-master-check.outputs[format('{0}_{1}_sha', matrix.arch, matrix.platform)] }}"
          echo "${EXPECTED}  zig.tar.xz" | sha256sum -c 2>/dev/null || echo "${EXPECTED}  zig.tar.xz" | shasum -a 256 -c
          tar xf zig.tar.xz
          echo "$(pwd)/zig-${{ matrix.arch }}-${{ matrix.platform }}-${VERSION}" >> "$GITHUB_PATH"

      - name: Test zig init, build, and test
        run: |
          set -euxo pipefail
          mkdir test-project && cd test-project
          zig init
          zig build --summary all
          zig build run
          zig build test --summary all

  zig-master-update:
    needs: [zig-master-check, zig-master-test]
    if: needs.zig-master-check.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        run: |
          VERSION="${{ needs.zig-master-check.outputs.version }}"
          mkdir -p /tmp/zig-downloads
          for arch_platform in aarch64-macos x86_64-macos aarch64-linux x86_64-linux; do
            curl -L -o "/tmp/zig-downloads/zig-${arch_platform}-${VERSION}.tar.xz" \
              "https://ziglang.org/builds/zig-${arch_platform}-${VERSION}.tar.xz"
          done
          echo "${{ needs.zig-master-check.outputs.aarch64_macos_sha }}  /tmp/zig-downloads/zig-aarch64-macos-${VERSION}.tar.xz" | sha256sum -c
          echo "${{ needs.zig-master-check.outputs.x86_64_macos_sha }}  /tmp/zig-downloads/zig-x86_64-macos-${VERSION}.tar.xz" | sha256sum -c
          echo "${{ needs.zig-master-check.outputs.aarch64_linux_sha }}  /tmp/zig-downloads/zig-aarch64-linux-${VERSION}.tar.xz" | sha256sum -c
          echo "${{ needs.zig-master-check.outputs.x86_64_linux_sha }}  /tmp/zig-downloads/zig-x86_64-linux-${VERSION}.tar.xz" | sha256sum -c

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.zig-master-check.outputs.version }}"
          DATE="${{ needs.zig-master-check.outputs.date }}"
          gh release delete zig-master-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create zig-master-latest \
            /tmp/zig-downloads/zig-aarch64-macos-${VERSION}.tar.xz \
            /tmp/zig-downloads/zig-x86_64-macos-${VERSION}.tar.xz \
            /tmp/zig-downloads/zig-aarch64-linux-${VERSION}.tar.xz \
            /tmp/zig-downloads/zig-x86_64-linux-${VERSION}.tar.xz \
            --title "Zig Master ${VERSION} (${DATE})" \
            --notes "Automated mirror of Zig nightly build.

          Version: ${VERSION}
          Date: ${DATE}
          Source: https://ziglang.org/download/" \
            --latest=false

      - name: Update formula
        run: |
          VERSION="${{ needs.zig-master-check.outputs.version }}"
          AARCH64_MACOS_SHA="${{ needs.zig-master-check.outputs.aarch64_macos_sha }}"
          X86_64_MACOS_SHA="${{ needs.zig-master-check.outputs.x86_64_macos_sha }}"
          AARCH64_LINUX_SHA="${{ needs.zig-master-check.outputs.aarch64_linux_sha }}"
          X86_64_LINUX_SHA="${{ needs.zig-master-check.outputs.x86_64_linux_sha }}"
          RELEASE_BASE="https://github.com/ataias/homebrew-formulae/releases/download/zig-master-latest"
          cat > Formula/zig-master.rb << FORMULA_EOF
          class ZigMaster < Formula
            desc "Zig programming language (master/nightly build)"
            homepage "https://ziglang.org/"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/zig-aarch64-macos-${VERSION}.tar.xz"
                sha256 "${AARCH64_MACOS_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/zig-x86_64-macos-${VERSION}.tar.xz"
                sha256 "${X86_64_MACOS_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/zig-aarch64-linux-${VERSION}.tar.xz"
                sha256 "${AARCH64_LINUX_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/zig-x86_64-linux-${VERSION}.tar.xz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            conflicts_with "zig", because: "both install a \`zig\` binary"

            def install
              bin.install "zig"
              lib.install Dir["lib/*"]
            end

            test do
              system bin/"zig", "init"
              system bin/"zig", "build", "--summary", "all"
              system bin/"zig", "build", "run"
              system bin/"zig", "build", "test", "--summary", "all"
            end
          end
          FORMULA_EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zig-master.rb
          git diff --cached --quiet && exit 0
          git commit -m "zig-master: update to ${{ needs.zig-master-check.outputs.version }}"
          git push

  zls-master-check:
    needs: [zig-master-check, zig-master-update]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      zls_commit: ${{ steps.zls-info.outputs.zls_commit }}
      zls_commit_short: ${{ steps.zls-info.outputs.zls_commit_short }}
      zig_version: ${{ needs.zig-master-check.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch ZLS info
        id: zls-info
        run: |
          ZLS_COMMIT=$(curl -sL "https://api.github.com/repos/zigtools/zls/commits/master" | jq -r '.sha')
          ZLS_COMMIT_SHORT=$(echo "$ZLS_COMMIT" | cut -c1-10)
          {
            echo "zls_commit=$ZLS_COMMIT"
            echo "zls_commit_short=$ZLS_COMMIT_SHORT"
          } >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          ZLS_COMMIT="${{ steps.zls-info.outputs.zls_commit_short }}"
          ZIG_VERSION="${{ needs.zig-master-check.outputs.version }}"
          CURRENT_ZLS_COMMIT=$(grep '# zls_commit:' Formula/zls-master.rb 2>/dev/null | sed 's/.*# zls_commit: //' || echo "")
          CURRENT_ZIG_VERSION=$(grep '# zig_version:' Formula/zls-master.rb 2>/dev/null | sed 's/.*# zig_version: //' || echo "")
          echo "ZLS_COMMIT=$ZLS_COMMIT CURRENT_ZLS_COMMIT=$CURRENT_ZLS_COMMIT"
          echo "ZIG_VERSION=$ZIG_VERSION CURRENT_ZIG_VERSION=$CURRENT_ZIG_VERSION"
          if [ "$CURRENT_ZLS_COMMIT" != "$ZLS_COMMIT" ] || [ "$CURRENT_ZIG_VERSION" != "$ZIG_VERSION" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

  zls-master-build:
    needs: zls-master-check
    if: needs.zls-master-check.outputs.needs_update == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    outputs:
      zls_version: ${{ steps.build.outputs.zls_version }}
      aarch64_macos_sha: ${{ steps.package.outputs.aarch64_macos_sha }}
      x86_64_macos_sha: ${{ steps.package.outputs.x86_64_macos_sha }}
      aarch64_linux_sha: ${{ steps.package.outputs.aarch64_linux_sha }}
      x86_64_linux_sha: ${{ steps.package.outputs.x86_64_linux_sha }}
    steps:
      - name: Download Zig
        run: |
          ZIG_VERSION="${{ needs.zls-master-check.outputs.zig_version }}"
          curl -L -o zig.tar.xz "https://ziglang.org/builds/zig-aarch64-macos-${ZIG_VERSION}.tar.xz"
          tar xf zig.tar.xz
          echo "$(pwd)/zig-aarch64-macos-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Clone ZLS
        run: |
          git clone https://github.com/zigtools/zls.git
          cd zls
          git checkout ${{ needs.zls-master-check.outputs.zls_commit }}

      - name: Build ZLS
        id: build
        run: |
          cd zls
          zig build -Doptimize=ReleaseSafe
          ZLS_VERSION=$(./zig-out/bin/zls --version)
          echo "zls_version=$ZLS_VERSION" >> "$GITHUB_OUTPUT"
          cp zig-out/bin/zls ../zls-aarch64-macos
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-macos
          cp zig-out/bin/zls ../zls-x86_64-macos
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux
          cp zig-out/bin/zls ../zls-aarch64-linux
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux
          cp zig-out/bin/zls ../zls-x86_64-linux

      - name: Package binaries
        id: package
        run: |
          for arch_platform in aarch64-macos x86_64-macos aarch64-linux x86_64-linux; do
            mkdir "zls-${arch_platform}"
            cp "zls-${arch_platform}" "zls-${arch_platform}/zls"
            tar cJf "zls-${arch_platform}.tar.xz" "zls-${arch_platform}/"
            SHA=$(shasum -a 256 "zls-${arch_platform}.tar.xz" | awk '{print $1}')
            OUTPUT_NAME=$(echo "${arch_platform}" | tr '-' '_')
            echo "${OUTPUT_NAME}_sha=$SHA" >> "$GITHUB_OUTPUT"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zls-binaries
          path: |
            zls-aarch64-macos.tar.xz
            zls-x86_64-macos.tar.xz
            zls-aarch64-linux.tar.xz
            zls-x86_64-linux.tar.xz

  zls-master-update:
    needs: [zls-master-check, zls-master-build]
    if: needs.zls-master-check.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: zls-binaries
          path: /tmp/zls-downloads

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZLS_VERSION="${{ needs.zls-master-build.outputs.zls_version }}"
          ZLS_COMMIT="${{ needs.zls-master-check.outputs.zls_commit_short }}"
          ZIG_VERSION="${{ needs.zls-master-check.outputs.zig_version }}"
          gh release delete zls-master-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create zls-master-latest \
            /tmp/zls-downloads/zls-aarch64-macos.tar.xz \
            /tmp/zls-downloads/zls-x86_64-macos.tar.xz \
            /tmp/zls-downloads/zls-aarch64-linux.tar.xz \
            /tmp/zls-downloads/zls-x86_64-linux.tar.xz \
            --title "ZLS Master ${ZLS_VERSION} (${ZLS_COMMIT})" \
            --notes "Automated build of ZLS from master.

          ZLS Version: ${ZLS_VERSION}
          ZLS Commit: ${ZLS_COMMIT}
          Built with Zig: ${ZIG_VERSION}
          Source: https://github.com/zigtools/zls" \
            --latest=false

      - name: Update formula
        run: |
          ZLS_VERSION="${{ needs.zls-master-build.outputs.zls_version }}"
          ZLS_COMMIT="${{ needs.zls-master-check.outputs.zls_commit_short }}"
          ZIG_VERSION="${{ needs.zls-master-check.outputs.zig_version }}"
          AARCH64_MACOS_SHA="${{ needs.zls-master-build.outputs.aarch64_macos_sha }}"
          X86_64_MACOS_SHA="${{ needs.zls-master-build.outputs.x86_64_macos_sha }}"
          AARCH64_LINUX_SHA="${{ needs.zls-master-build.outputs.aarch64_linux_sha }}"
          X86_64_LINUX_SHA="${{ needs.zls-master-build.outputs.x86_64_linux_sha }}"
          RELEASE_BASE="https://github.com/ataias/homebrew-formulae/releases/download/zls-master-latest"
          cat > Formula/zls-master.rb << FORMULA_EOF
          class ZlsMaster < Formula
            desc "Zig Language Server (master/nightly build)"
            homepage "https://github.com/zigtools/zls"
            version "${ZLS_VERSION}"
            license "MIT"
            # zls_commit: ${ZLS_COMMIT}
            # zig_version: ${ZIG_VERSION}

            depends_on "ataias/formulae/zig-master"

            on_macos do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/zls-aarch64-macos.tar.xz"
                sha256 "${AARCH64_MACOS_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/zls-x86_64-macos.tar.xz"
                sha256 "${X86_64_MACOS_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/zls-aarch64-linux.tar.xz"
                sha256 "${AARCH64_LINUX_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/zls-x86_64-linux.tar.xz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            conflicts_with "zls", because: "both install a \`zls\` binary"

            def install
              bin.install "zls"
            end

            test do
              system bin/"zls", "--version"
            end
          end
          FORMULA_EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zls-master.rb
          git diff --cached --quiet && exit 0
          git commit -m "zls-master: update to ${{ needs.zls-master-build.outputs.zls_version }}"
          git pull --rebase
          git push

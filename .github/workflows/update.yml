name: Auto-update packages

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  zig-master-check:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      version: ${{ steps.zig-info.outputs.version }}
      date: ${{ steps.zig-info.outputs.date }}
      aarch64_macos_sha: ${{ steps.zig-info.outputs.aarch64_macos_sha }}
      x86_64_macos_sha: ${{ steps.zig-info.outputs.x86_64_macos_sha }}
      aarch64_linux_sha: ${{ steps.zig-info.outputs.aarch64_linux_sha }}
      x86_64_linux_sha: ${{ steps.zig-info.outputs.x86_64_linux_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch Zig master info
        id: zig-info
        run: |
          curl -sL https://ziglang.org/download/index.json | jq -r '.master' > /tmp/zig-master.json
          {
            echo "version=$(jq -r '.version' /tmp/zig-master.json)"
            echo "date=$(jq -r '.date' /tmp/zig-master.json)"
            echo "aarch64_macos_sha=$(jq -r '."aarch64-macos".shasum' /tmp/zig-master.json)"
            echo "x86_64_macos_sha=$(jq -r '."x86_64-macos".shasum' /tmp/zig-master.json)"
            echo "aarch64_linux_sha=$(jq -r '."aarch64-linux".shasum' /tmp/zig-master.json)"
            echo "x86_64_linux_sha=$(jq -r '."x86_64-linux".shasum' /tmp/zig-master.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_VERSION="${{ steps.zig-info.outputs.version }}"
          CURRENT_VERSION=$(grep 'version "' Formula/zig-master.rb | head -1 | sed 's/.*version "//;s/".*//')
          RELEASE_EXISTS=$(gh release view zig-master-latest --json tagName 2>/dev/null && echo true || echo false)
          if [ "$CURRENT_VERSION" != "$NEW_VERSION" ] || [ "$RELEASE_EXISTS" = "false" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

  zig-master-test:
    needs: zig-master-check
    if: needs.zig-master-check.outputs.needs_update == 'true'
    strategy:
      matrix:
        include:
          - os: macos-26
            arch: aarch64
            platform: macos
          - os: ubuntu-latest
            arch: x86_64
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download and extract Zig
        run: |
          VERSION="${{ needs.zig-master-check.outputs.version }}"
          curl -L -o zig.tar.xz "https://ziglang.org/builds/zig-${{ matrix.arch }}-${{ matrix.platform }}-${VERSION}.tar.xz"
          EXPECTED="${{ needs.zig-master-check.outputs[format('{0}_{1}_sha', matrix.arch, matrix.platform)] }}"
          echo "${EXPECTED}  zig.tar.xz" | sha256sum -c 2>/dev/null || echo "${EXPECTED}  zig.tar.xz" | shasum -a 256 -c
          tar xf zig.tar.xz
          echo "$(pwd)/zig-${{ matrix.arch }}-${{ matrix.platform }}-${VERSION}" >> "$GITHUB_PATH"

      - name: Test zig init, build, and test
        run: |
          set -euxo pipefail
          mkdir test-project && cd test-project
          zig init
          zig build --summary all
          zig build run
          zig build test --summary all

  zig-master-update:
    needs: [zig-master-check, zig-master-test]
    if: needs.zig-master-check.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        run: |
          VERSION="${{ needs.zig-master-check.outputs.version }}"
          mkdir -p /tmp/zig-downloads
          for arch_platform in aarch64-macos x86_64-macos aarch64-linux x86_64-linux; do
            curl -L -o "/tmp/zig-downloads/zig-${arch_platform}-${VERSION}.tar.xz" \
              "https://ziglang.org/builds/zig-${arch_platform}-${VERSION}.tar.xz"
          done
          echo "${{ needs.zig-master-check.outputs.aarch64_macos_sha }}  /tmp/zig-downloads/zig-aarch64-macos-${VERSION}.tar.xz" | sha256sum -c
          echo "${{ needs.zig-master-check.outputs.x86_64_macos_sha }}  /tmp/zig-downloads/zig-x86_64-macos-${VERSION}.tar.xz" | sha256sum -c
          echo "${{ needs.zig-master-check.outputs.aarch64_linux_sha }}  /tmp/zig-downloads/zig-aarch64-linux-${VERSION}.tar.xz" | sha256sum -c
          echo "${{ needs.zig-master-check.outputs.x86_64_linux_sha }}  /tmp/zig-downloads/zig-x86_64-linux-${VERSION}.tar.xz" | sha256sum -c

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.zig-master-check.outputs.version }}"
          DATE="${{ needs.zig-master-check.outputs.date }}"
          gh release delete zig-master-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create zig-master-latest \
            /tmp/zig-downloads/zig-aarch64-macos-${VERSION}.tar.xz \
            /tmp/zig-downloads/zig-x86_64-macos-${VERSION}.tar.xz \
            /tmp/zig-downloads/zig-aarch64-linux-${VERSION}.tar.xz \
            /tmp/zig-downloads/zig-x86_64-linux-${VERSION}.tar.xz \
            --title "Zig Master ${VERSION} (${DATE})" \
            --notes "Automated mirror of Zig nightly build.

          Version: ${VERSION}
          Date: ${DATE}
          Source: https://ziglang.org/download/" \
            --latest=false
          gh release edit zig-master-latest --draft=false

      - name: Update formula
        run: |
          VERSION="${{ needs.zig-master-check.outputs.version }}"
          AARCH64_MACOS_SHA="${{ needs.zig-master-check.outputs.aarch64_macos_sha }}"
          X86_64_MACOS_SHA="${{ needs.zig-master-check.outputs.x86_64_macos_sha }}"
          AARCH64_LINUX_SHA="${{ needs.zig-master-check.outputs.aarch64_linux_sha }}"
          X86_64_LINUX_SHA="${{ needs.zig-master-check.outputs.x86_64_linux_sha }}"
          RELEASE_BASE="https://github.com/ataias/homebrew-formulae/releases/download/zig-master-latest"
          cat > Formula/zig-master.rb << FORMULA_EOF
          class ZigMaster < Formula
            desc "Zig programming language (master/nightly build)"
            homepage "https://ziglang.org/"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/zig-aarch64-macos-${VERSION}.tar.xz"
                sha256 "${AARCH64_MACOS_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/zig-x86_64-macos-${VERSION}.tar.xz"
                sha256 "${X86_64_MACOS_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/zig-aarch64-linux-${VERSION}.tar.xz"
                sha256 "${AARCH64_LINUX_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/zig-x86_64-linux-${VERSION}.tar.xz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            conflicts_with "zig", because: "both install a \`zig\` binary"

            def install
              bin.install "zig"
              lib.install Dir["lib/*"]
            end

            test do
              system bin/"zig", "init"
              system bin/"zig", "build", "--summary", "all"
              system bin/"zig", "build", "run"
              system bin/"zig", "build", "test", "--summary", "all"
            end
          end
          FORMULA_EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zig-master.rb
          git diff --cached --quiet && exit 0
          git commit -m "zig-master: update to ${{ needs.zig-master-check.outputs.version }}"
          git push

  zls-master-check:
    needs: [zig-master-check, zig-master-update]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      revision: ${{ steps.check.outputs.revision }}
      zls_commit: ${{ steps.zls-info.outputs.zls_commit }}
      zls_commit_short: ${{ steps.zls-info.outputs.zls_commit_short }}
      zig_version: ${{ needs.zig-master-check.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch ZLS info
        id: zls-info
        run: |
          ZLS_COMMIT=$(curl -sL "https://api.github.com/repos/zigtools/zls/commits/master" | jq -r '.sha')
          ZLS_COMMIT_SHORT=$(echo "$ZLS_COMMIT" | cut -c1-10)
          {
            echo "zls_commit=$ZLS_COMMIT"
            echo "zls_commit_short=$ZLS_COMMIT_SHORT"
          } >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          ZLS_COMMIT="${{ steps.zls-info.outputs.zls_commit_short }}"
          ZIG_VERSION="${{ needs.zig-master-check.outputs.version }}"
          CURRENT_ZLS_COMMIT=$(grep '# zls_commit:' Formula/zls-master.rb 2>/dev/null | sed 's/.*# zls_commit: //' || echo "")
          CURRENT_ZIG_VERSION=$(grep '# zig_version:' Formula/zls-master.rb 2>/dev/null | sed 's/.*# zig_version: //' || echo "")
          CURRENT_REVISION=$(grep 'revision ' Formula/zls-master.rb 2>/dev/null | sed 's/.*revision //' || echo "0")
          echo "ZLS_COMMIT=$ZLS_COMMIT CURRENT_ZLS_COMMIT=$CURRENT_ZLS_COMMIT"
          echo "ZIG_VERSION=$ZIG_VERSION CURRENT_ZIG_VERSION=$CURRENT_ZIG_VERSION"
          echo "CURRENT_REVISION=$CURRENT_REVISION"
          if [ "$CURRENT_ZLS_COMMIT" != "$ZLS_COMMIT" ]; then
            echo "ZLS commit changed, revision resets to 0"
            {
              echo "needs_update=true"
              echo "revision=0"
            } >> "$GITHUB_OUTPUT"
          elif [ "$CURRENT_ZIG_VERSION" != "$ZIG_VERSION" ]; then
            NEW_REVISION=$((CURRENT_REVISION + 1))
            echo "Zig version changed, bumping revision to $NEW_REVISION"
            {
              echo "needs_update=true"
              echo "revision=$NEW_REVISION"
            } >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

  zls-master-build:
    needs: zls-master-check
    if: ${{ !cancelled() && needs.zls-master-check.outputs.needs_update == 'true' }}
    runs-on: macos-26
    timeout-minutes: 30
    outputs:
      zls_version: ${{ steps.build.outputs.zls_version }}
      aarch64_macos_sha: ${{ steps.package.outputs.aarch64_macos_sha }}
      x86_64_macos_sha: ${{ steps.package.outputs.x86_64_macos_sha }}
      aarch64_linux_sha: ${{ steps.package.outputs.aarch64_linux_sha }}
      x86_64_linux_sha: ${{ steps.package.outputs.x86_64_linux_sha }}
    steps:
      - name: Download Zig
        run: |
          ZIG_VERSION="${{ needs.zls-master-check.outputs.zig_version }}"
          RELEASE_BASE="https://github.com/ataias/homebrew-formulae/releases/download/zig-master-latest"
          curl -L -o zig.tar.xz "${RELEASE_BASE}/zig-aarch64-macos-${ZIG_VERSION}.tar.xz"
          tar xf zig.tar.xz
          echo "$(pwd)/zig-aarch64-macos-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Clone ZLS
        run: |
          git clone https://github.com/zigtools/zls.git
          cd zls
          git checkout ${{ needs.zls-master-check.outputs.zls_commit }}

      - name: Build ZLS
        id: build
        run: |
          cd zls
          mkdir -p ../bin
          zig build -Doptimize=ReleaseSafe
          ZLS_VERSION=$(./zig-out/bin/zls --version)
          echo "zls_version=$ZLS_VERSION" >> "$GITHUB_OUTPUT"
          cp zig-out/bin/zls ../bin/zls-aarch64-macos
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-macos
          cp zig-out/bin/zls ../bin/zls-x86_64-macos
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux
          cp zig-out/bin/zls ../bin/zls-aarch64-linux
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux
          cp zig-out/bin/zls ../bin/zls-x86_64-linux

      - name: Package binaries
        id: package
        run: |
          for arch_platform in aarch64-macos x86_64-macos aarch64-linux x86_64-linux; do
            mkdir "zls-${arch_platform}"
            cp "bin/zls-${arch_platform}" "zls-${arch_platform}/zls"
            tar cJf "zls-${arch_platform}.tar.xz" "zls-${arch_platform}/"
            SHA=$(shasum -a 256 "zls-${arch_platform}.tar.xz" | awk '{print $1}')
            OUTPUT_NAME=$(echo "${arch_platform}" | tr '-' '_')
            echo "${OUTPUT_NAME}_sha=$SHA" >> "$GITHUB_OUTPUT"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zls-binaries
          path: |
            zls-aarch64-macos.tar.xz
            zls-x86_64-macos.tar.xz
            zls-aarch64-linux.tar.xz
            zls-x86_64-linux.tar.xz

  zls-master-update:
    needs: [zls-master-check, zls-master-build]
    if: ${{ !failure() && !cancelled() && needs.zls-master-check.outputs.needs_update == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: zls-binaries
          path: /tmp/zls-downloads

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZLS_VERSION="${{ needs.zls-master-build.outputs.zls_version }}"
          ZLS_COMMIT="${{ needs.zls-master-check.outputs.zls_commit_short }}"
          ZIG_VERSION="${{ needs.zls-master-check.outputs.zig_version }}"
          gh release delete zls-master-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create zls-master-latest \
            /tmp/zls-downloads/zls-aarch64-macos.tar.xz \
            /tmp/zls-downloads/zls-x86_64-macos.tar.xz \
            /tmp/zls-downloads/zls-aarch64-linux.tar.xz \
            /tmp/zls-downloads/zls-x86_64-linux.tar.xz \
            --title "ZLS Master ${ZLS_VERSION} (${ZLS_COMMIT})" \
            --notes "Automated build of ZLS from master.

          ZLS Version: ${ZLS_VERSION}
          ZLS Commit: ${ZLS_COMMIT}
          Built with Zig: ${ZIG_VERSION}
          Source: https://github.com/zigtools/zls" \
            --latest=false
          gh release edit zls-master-latest --draft=false

      - name: Update formula
        run: |
          ZLS_VERSION="${{ needs.zls-master-build.outputs.zls_version }}"
          ZLS_COMMIT="${{ needs.zls-master-check.outputs.zls_commit_short }}"
          ZIG_VERSION="${{ needs.zls-master-check.outputs.zig_version }}"
          REVISION="${{ needs.zls-master-check.outputs.revision }}"
          AARCH64_MACOS_SHA="${{ needs.zls-master-build.outputs.aarch64_macos_sha }}"
          X86_64_MACOS_SHA="${{ needs.zls-master-build.outputs.x86_64_macos_sha }}"
          AARCH64_LINUX_SHA="${{ needs.zls-master-build.outputs.aarch64_linux_sha }}"
          X86_64_LINUX_SHA="${{ needs.zls-master-build.outputs.x86_64_linux_sha }}"
          RELEASE_BASE="https://github.com/ataias/homebrew-formulae/releases/download/zls-master-latest"
          REVISION_LINE=""
          if [ "$REVISION" -gt 0 ] 2>/dev/null; then
            REVISION_LINE=$'\n  revision '"${REVISION}"
          fi
          cat > Formula/zls-master.rb << FORMULA_EOF
          class ZlsMaster < Formula
            desc "Zig Language Server (master/nightly build)"
            homepage "https://github.com/zigtools/zls"
            version "${ZLS_VERSION}"
            license "MIT"${REVISION_LINE}
            # zls_commit: ${ZLS_COMMIT}
            # zig_version: ${ZIG_VERSION}

            depends_on "ataias/formulae/zig-master"

            on_macos do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/zls-aarch64-macos.tar.xz"
                sha256 "${AARCH64_MACOS_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/zls-x86_64-macos.tar.xz"
                sha256 "${X86_64_MACOS_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/zls-aarch64-linux.tar.xz"
                sha256 "${AARCH64_LINUX_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/zls-x86_64-linux.tar.xz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            conflicts_with "zls", because: "both install a \`zls\` binary"

            def install
              bin.install "zls"
            end

            test do
              system bin/"zls", "--version"
            end
          end
          FORMULA_EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zls-master.rb
          git diff --cached --quiet && exit 0
          git commit -m "zls-master: update to ${{ needs.zls-master-build.outputs.zls_version }}"
          git pull --rebase
          git push

  helix-master-check:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      helix_commit: ${{ steps.info.outputs.helix_commit }}
      helix_commit_short: ${{ steps.info.outputs.helix_commit_short }}
      helix_version: ${{ steps.info.outputs.helix_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch Helix master info
        id: info
        run: |
          HELIX_COMMIT=$(curl -sL "https://api.github.com/repos/helix-editor/helix/commits/master" | jq -r '.sha')
          HELIX_COMMIT_SHORT=$(echo "$HELIX_COMMIT" | cut -c1-10)
          CARGO_VERSION=$(curl -sL "https://raw.githubusercontent.com/helix-editor/helix/${HELIX_COMMIT}/Cargo.toml" \
            | awk '/\[workspace.package\]/{flag=1; next} /^\[/{flag=0} flag && /^version/' \
            | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          if [ -z "$CARGO_VERSION" ]; then
            echo "failed to parse Cargo.toml workspace version" >&2
            exit 1
          fi
          {
            echo "helix_commit=$HELIX_COMMIT"
            echo "helix_commit_short=$HELIX_COMMIT_SHORT"
            echo "helix_version=${CARGO_VERSION}+${HELIX_COMMIT_SHORT}"
          } >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HELIX_COMMIT="${{ steps.info.outputs.helix_commit_short }}"
          CURRENT_HELIX_COMMIT=$(grep '# helix_commit:' Formula/helix-master.rb 2>/dev/null | sed 's/.*# helix_commit: //' || echo "")
          RELEASE_EXISTS=$(gh release view helix-master-latest --json tagName 2>/dev/null && echo true || echo false)
          if [ "$CURRENT_HELIX_COMMIT" != "$HELIX_COMMIT" ] || [ "$RELEASE_EXISTS" = "false" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

  helix-master-build-macos:
    needs: helix-master-check
    if: ${{ !cancelled() && needs.helix-master-check.outputs.needs_update == 'true' }}
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          else
            rustup default stable
          fi

      - name: Clone Helix
        run: |
          git clone https://github.com/helix-editor/helix.git
          cd helix
          git checkout ${{ needs.helix-master-check.outputs.helix_commit }}

      - name: Build Helix
        run: |
          cd helix
          cargo install --path helix-term --locked --root ./install

      - name: Package
        run: |
          PKG="helix-aarch64-macos"
          mkdir "$PKG"
          cp helix/install/bin/hx "$PKG/hx"
          tar -cf - -C helix --exclude='runtime/grammars/sources' runtime | tar -xf - -C "$PKG"
          tar cJf "$PKG.tar.xz" "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-aarch64-macos
          path: helix-aarch64-macos.tar.xz

  helix-master-build-linux:
    needs: helix-master-check
    if: ${{ !cancelled() && needs.helix-master-check.outputs.needs_update == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    container: ubuntu:26.04
    timeout-minutes: 60
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config xz-utils

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Clone Helix
        run: |
          git clone https://github.com/helix-editor/helix.git
          cd helix
          git checkout ${{ needs.helix-master-check.outputs.helix_commit }}

      - name: Build Helix
        run: |
          cd helix
          cargo install --path helix-term --locked --root ./install

      - name: Package
        run: |
          PKG="helix-${{ matrix.arch }}-linux"
          mkdir "$PKG"
          cp helix/install/bin/hx "$PKG/hx"
          tar -cf - -C helix --exclude='runtime/grammars/sources' runtime | tar -xf - -C "$PKG"
          tar cJf "$PKG.tar.xz" "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-${{ matrix.arch }}-linux
          path: helix-${{ matrix.arch }}-linux.tar.xz

  helix-master-update:
    needs: [helix-master-check, helix-master-build-macos, helix-master-build-linux]
    if: ${{ !failure() && !cancelled() && needs.helix-master-check.outputs.needs_update == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/helix-downloads
          pattern: helix-*
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        run: |
          cd /tmp/helix-downloads
          for arch_platform in aarch64-macos aarch64-linux x86_64-linux; do
            SHA=$(sha256sum "helix-${arch_platform}.tar.xz" | awk '{print $1}')
            OUTPUT_NAME=$(echo "${arch_platform}" | tr '-' '_')
            echo "${OUTPUT_NAME}_sha=$SHA" >> "$GITHUB_OUTPUT"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HELIX_VERSION="${{ needs.helix-master-check.outputs.helix_version }}"
          HELIX_COMMIT="${{ needs.helix-master-check.outputs.helix_commit_short }}"
          gh release delete helix-master-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create helix-master-latest \
            /tmp/helix-downloads/helix-aarch64-macos.tar.xz \
            /tmp/helix-downloads/helix-aarch64-linux.tar.xz \
            /tmp/helix-downloads/helix-x86_64-linux.tar.xz \
            --title "Helix Master ${HELIX_VERSION}" \
            --notes "Automated build of Helix from master.

          Version: ${HELIX_VERSION}
          Commit: ${HELIX_COMMIT}
          Linux builds produced inside ubuntu:26.04 container.
          Source: https://github.com/helix-editor/helix" \
            --latest=false
          gh release edit helix-master-latest --draft=false

      - name: Update formula
        run: |
          HELIX_VERSION="${{ needs.helix-master-check.outputs.helix_version }}"
          HELIX_COMMIT="${{ needs.helix-master-check.outputs.helix_commit_short }}"
          AARCH64_MACOS_SHA="${{ steps.sha.outputs.aarch64_macos_sha }}"
          AARCH64_LINUX_SHA="${{ steps.sha.outputs.aarch64_linux_sha }}"
          X86_64_LINUX_SHA="${{ steps.sha.outputs.x86_64_linux_sha }}"
          RELEASE_BASE="https://github.com/ataias/homebrew-formulae/releases/download/helix-master-latest"
          cat > Formula/helix-master.rb << FORMULA_EOF
          class HelixMaster < Formula
            desc "Post-modern modal text editor (master/nightly build)"
            homepage "https://helix-editor.com/"
            version "${HELIX_VERSION}"
            license "MPL-2.0"
            # helix_commit: ${HELIX_COMMIT}

            on_macos do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/helix-aarch64-macos.tar.xz"
                sha256 "${AARCH64_MACOS_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/helix-aarch64-linux.tar.xz"
                sha256 "${AARCH64_LINUX_SHA}"
              end
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/helix-x86_64-linux.tar.xz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            conflicts_with "helix", because: "both install a \`hx\` binary"

            def install
              (libexec/"bin").install "hx"
              libexec.install "runtime"
              bin.env_script_all_files libexec/"bin", HELIX_RUNTIME: libexec/"runtime"
            end

            test do
              assert_match "helix", shell_output("#{bin}/hx --version")
            end
          end
          FORMULA_EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/helix-master.rb
          git diff --cached --quiet && exit 0
          git commit -m "helix-master: update to ${{ needs.helix-master-check.outputs.helix_version }}"
          git pull --rebase
          git push
